apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workers.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                  description: LLM model ID (e.g. claude-sonnet-4-6, qwen3.5-plus)
                runtime:
                  type: string
                  enum: [openclaw, copaw, fastclaw, zeroclaw, nanoclaw, openfang]
                  default: openclaw
                  description: "Worker runtime type: openclaw (Node.js), copaw (Python), fastclaw (Python lightweight), zeroclaw (Rust high-performance), nanoclaw (Node.js minimal), openfang (Rust enterprise)"
                runtimeConfig:
                  type: object
                  description: "Runtime-specific configuration options"
                  properties:
                    fastclaw:
                      type: object
                      properties:
                        pythonVersion:
                          type: string
                          enum: ["3.11", "3.12"]
                          default: "3.11"
                        sdk:
                          type: string
                          enum: [claude, openai]
                          default: claude
                    zeroclaw:
                      type: object
                      properties:
                        wasmSupport:
                          type: boolean
                          default: false
                        concurrency:
                          type: integer
                          default: 100
                          minimum: 1
                          maximum: 10000
                    nanoclaw:
                      type: object
                      properties:
                        containerTimeout:
                          type: integer
                          default: 300
                          minimum: 60
                          maximum: 1800
                          description: Container timeout in seconds
                        channel:
                          type: string
                          enum: [whatsapp, matrix]
                          default: matrix
                    openfang:
                      type: object
                      properties:
                        pluginDir:
                          type: string
                          default: /app/plugins
                        observability:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: false
                            tracingEndpoint:
                              type: string
                            metricsEndpoint:
                              type: string
                        security:
                          type: object
                          properties:
                            smCrypto:
                              type: boolean
                              default: false
                              description: Enable Chinese commercial cryptographic algorithms
                            auditLog:
                              type: boolean
                              default: true
                image:
                  type: string
                  description: Custom Docker image for this worker
                identity:
                  type: string
                  description: Worker public identity (generates IDENTITY.md; merged into SOUL.md for copaw)
                soul:
                  type: string
                  description: Worker identity and role definition (generates SOUL.md)
                agents:
                  type: string
                  description: Agent behavior rules (generates AGENTS.md)
                skills:
                  type: array
                  items:
                    type: string
                  description: HiClaw built-in skills to enable
                mcpServers:
                  type: array
                  items:
                    type: string
                  description: HiClaw built-in MCP Servers to authorize via Higress
                package:
                  type: string
                  description: "Package URI: file://, http(s)://, nacos://, or packages/{name}.zip"
                expose:
                  type: array
                  description: Ports to expose via Higress gateway. Each port gets an auto-generated domain.
                  items:
                    type: object
                    required: [port]
                    properties:
                      port:
                        type: integer
                        description: Container port to expose
                      protocol:
                        type: string
                        enum: [http, grpc]
                        default: http
                        description: Protocol (default http)
                channelPolicy:
                  type: object
                  description: "Additive/subtractive overrides for communication policies (on top of defaults)"
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                      description: "Additional Matrix user IDs to allow in group @mentions"
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                      description: "Matrix user IDs to deny from group @mentions (overrides allow)"
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                      description: "Additional Matrix user IDs to allow in DMs"
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
                      description: "Matrix user IDs to deny from DMs (overrides allow)"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Updating, Stopped, Failed]
                matrixUserID:
                  type: string
                roomID:
                  type: string
                containerState:
                  type: string
                lastHeartbeat:
                  type: string
                  format: date-time
                message:
                  type: string
                exposedPorts:
                  type: array
                  description: Ports currently exposed via Higress gateway
                  items:
                    type: object
                    properties:
                      port:
                        type: integer
                      domain:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: workers
    singular: worker
    kind: Worker
    shortNames: [wk]
