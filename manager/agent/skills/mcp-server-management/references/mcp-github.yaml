      value: "application/vnd.github+json"
    - key: X-GitHub-Api-Version
      value: "2022-11-28"
    - key: User-Agent
      value: "higress-mcp"

- name: list_pull_requests
  description: 列出并过滤GitHub仓库的Pull Requests
  args:
  - name: owner
    type: string
    required: true
    description: "Repository owner (username or organization)"
  - name: repo
    type: string
    required: true
    description: "Repository name"
  - name: state
    type: string
    required: false
    description: "State of the pull requests to return"
  - name: head
    type: string
    required: false
    description: "Filter by head user or head organization and branch name"
  - name: base
    type: string
    required: false
    description: "Filter by base branch name"
  - name: sort
    type: string
    required: false
    description: "What to sort results by"
  - name: direction
    type: string
    required: false
    description: "The direction of the sort"
  - name: per_page
    type: number
    required: false
    description: "Results per page (max 100)"
  - name: page
    type: number
    required: false
    description: "Page number of the results"
  requestTemplate:
    url: "https://api.github.com/repos/{{.args.owner}}/{{.args.repo}}/pulls?state={{.args.state}}&head={{.args.head}}&base={{.args.base}}&sort={{.args.sort}}&direction={{.args.direction}}&per_page={{.args.per_page}}&page={{.args.page}}"
    method: GET
    headers:
    - key: Authorization
      value: "Bearer {{.config.accessToken}}"
    - key: Accept
      value: "application/vnd.github+json"
    - key: X-GitHub-Api-Version
      value: "2022-11-28"
    - key: User-Agent
      value: "higress-mcp"

- name: create_pull_request_review
  description: 在GitHub Pull Request上创建review
  args:
  - name: owner
    type: string
    required: true
    description: "Repository owner (username or organization)"
  - name: repo
    type: string
    required: true
    description: "Repository name"
  - name: pull_number
    type: number
    required: true
    description: "Pull request number"
  - name: commit_id
    type: string
    required: false
    description: "The SHA of the commit that needs a review"
  - name: body
    type: string
    required: true
    description: "The body text of the review"
  - name: event
    type: string
    required: true
