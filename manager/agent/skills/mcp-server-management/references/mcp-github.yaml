    type: string
    required: true
    description: "Repository owner (username or organization)"
  - name: repo
    type: string
    required: true
    description: "Repository name"
  - name: pull_number
    type: number
    required: true
    description: "Pull request number"
  - name: reviewers
    type: array
    items:
      type: string
    required: false
    description: "Usernames of reviewers to request"
  - name: team_reviewers
    type: array
    items:
      type: string
    required: false
    description: "Team slugs to request as reviewers"
  requestTemplate:
    url: "https://api.github.com/repos/{{.args.owner}}/{{.args.repo}}/pulls/{{.args.pull_number}}/requested_reviewers"
    method: POST
    body: |
      {
        "reviewers": {{.args.reviewers | toJson}},
        "team_reviewers": {{.args.team_reviewers | toJson}}
