- name: create_pull_request_review_comment
  description: 在GitHub Pull Request的diff上创建review comment（可以评论特定代码行）
  args:
  - name: owner
    type: string
    required: true
    description: "Repository owner (username or organization)"
  - name: repo
    type: string
    required: true
    description: "Repository name"
  - name: pull_number
    type: number
    required: true
    description: "Pull request number"
  - name: body
    type: string
    required: true
    description: "The text of the review comment"
  - name: commit_id
    type: string
    required: false
    description: "The SHA of the commit that the comment applies to (required for new comments, not for replies)"
  - name: path
    type: string
    required: false
    description: "The relative path to the file that necessitates a comment (required for new comments)"
  - name: line
    type: number
    required: false
    description: "The line number in the file to comment on (for single-line comments)"
  - name: start_line
    type: number
    required: false
    description: "The first line of the range for multi-line comments"
  - name: side
    type: string
    required: false
    description: "The side of the diff to comment on: LEFT (before) or RIGHT (after), defaults to RIGHT"
  - name: start_side
    type: string
    required: false
    description: "The side of the first line of the range for multi-line comments: LEFT or RIGHT"
  - name: in_reply_to
    type: number
    required: false
    description: "The ID of the review comment to reply to (use this instead of commit_id/path/line for replies)"
  requestTemplate:
    url: "https://api.github.com/repos/{{.args.owner}}/{{.args.repo}}/pulls/{{.args.pull_number}}/comments"
    method: POST
    body: |
      {
        "body": "{{.args.body}}",
        "commit_id": "{{.args.commit_id}}",
        "path": "{{.args.path}}",
        "line": {{.args.line}},
        "start_line": {{.args.start_line}},
        "side": "{{.args.side}}",
        "start_side": "{{.args.start_side}}",
        "in_reply_to": {{.args.in_reply_to}}
      }
    headers:
    - key: Authorization
      value: "Bearer {{.config.accessToken}}"
    - key: Accept
      value: "application/vnd.github+json"
    - key: X-GitHub-Api-Version
      value: "2022-11-28"
    - key: User-Agent
      value: "higress-mcp"

