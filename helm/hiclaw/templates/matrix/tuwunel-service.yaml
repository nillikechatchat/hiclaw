{{- if eq .Values.matrix.provider "tuwunel" }}
{{- $comp := dict "root" . "component" "tuwunel" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hiclaw.tuwunel.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "hiclaw.component.selectorLabels" $comp | nindent 4 }}
  ports:
    - name: matrix
      port: {{ .Values.matrix.tuwunel.service.port }}
      targetPort: matrix
      protocol: TCP
{{- end }}
