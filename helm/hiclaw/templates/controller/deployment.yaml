{{- $comp := dict "root" . "component" "controller" }}
{{- $tag := include "hiclaw.imageTag" (dict "tag" .Values.controller.image.tag "global" .Values.global) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "hiclaw.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hiclaw.component.selectorLabels" $comp | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hiclaw.controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.secretName" . }}
          env:
            - name: HICLAW_KUBE_MODE
              value: "incluster"
            - name: HICLAW_HTTP_ADDR
              value: {{ printf ":%v" .Values.controller.service.targetPort | quote }}
            - name: HICLAW_CONTROLLER_URL
              value: {{ include "hiclaw.controller.internalURL" . | quote }}
            {{- /*
              Controller instance name. Also doubles as the ConfigMap name the
              controller reads at Create() time for the agent PodTemplateSpec
              overlay (same namespace, key: pod-template.yaml). Users wanting
              to inject sysctls / nodeSelector / tolerations / imagePullSecrets
              etc. into every Manager/Worker Pod must create a ConfigMap with
              this exact name. Absent ConfigMap = no overlay (default shape).
              See docs/agent-pod-template.md.
            */}}
            - name: HICLAW_CONTROLLER_NAME
              value: {{ include "hiclaw.controller.fullname" . | quote }}
            {{- /*
              Tenant-level resource-name prefix. Drives Pod / ServiceAccount
              / "app" label / STS session-name derivation for all resources
              this controller creates. Set controller.resourcePrefix (e.g.
              "teamA-") to isolate multiple HiClaw instances sharing one
              namespace. See internal/auth.ResourcePrefix for the full
              derivation table.
            */}}
            - name: HICLAW_RESOURCE_PREFIX
              value: {{ .Values.controller.resourcePrefix | default "hiclaw-" | quote }}
            - name: HICLAW_WORKER_BACKEND
              value: {{ .Values.controller.workerBackend | quote }}
            - name: HICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HICLAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.openclawImage" . | quote }}
            - name: HICLAW_COPAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.copawImage" . | quote }}
            - name: HICLAW_HERMES_WORKER_IMAGE
              value: {{ include "hiclaw.worker.hermesImage" . | quote }}
            - name: HICLAW_DEFAULT_WORKER_RUNTIME
              value: {{ .Values.worker.defaultRuntime | quote }}
            - name: TZ
              value: {{ .Values.controller.timezone | quote }}
            - name: HICLAW_STORAGE_PROVIDER
              value: {{ .Values.storage.provider | quote }}
            - name: HICLAW_FS_ENDPOINT
              value: {{ include "hiclaw.storage.endpoint" . | quote }}
            - name: HICLAW_FS_BUCKET
              value: {{ include "hiclaw.storage.bucket" . | quote }}
            {{- if eq .Values.storage.provider "minio" }}
            - name: HICLAW_FS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.storage.adminSecretName" . }}
                  key: {{ include "hiclaw.storage.adminAccessKeyKey" . }}
            - name: HICLAW_FS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.storage.adminSecretName" . }}
                  key: {{ include "hiclaw.storage.adminSecretKeyKey" . }}
            {{- end }}
            - name: HICLAW_GATEWAY_PROVIDER
              value: {{ .Values.gateway.provider | quote }}
            {{- if eq .Values.gateway.provider "higress" }}
            - name: HICLAW_AI_GATEWAY_ADMIN_URL
              value: {{ include "hiclaw.gateway.adminURL" . | quote }}
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ include "hiclaw.gateway.internalURL" . | quote }}
            {{- else if eq .Values.gateway.provider "ai-gateway" }}
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ include "hiclaw.gateway.internalURL" . | quote }}
            - name: HICLAW_REGION
              value: {{ .Values.gateway.aiGateway.region | quote }}
            - name: HICLAW_GW_GATEWAY_ID
              value: {{ .Values.gateway.aiGateway.gatewayId | quote }}
            - name: HICLAW_GW_MODEL_API_ID
              value: {{ .Values.gateway.aiGateway.modelApiId | quote }}
            - name: HICLAW_GW_ENV_ID
              value: {{ .Values.gateway.aiGateway.envId | quote }}
            {{- end }}
            {{- if .Values.credentialProvider.enabled }}
            - name: HICLAW_CREDENTIAL_PROVIDER_URL
              value: {{ printf "http://127.0.0.1:%d" (.Values.credentialProvider.port | int) | quote }}
            {{- end }}
            {{- /* Matrix connection (Go MatrixClient) */}}
            - name: HICLAW_MATRIX_URL
              value: {{ include "hiclaw.matrix.internalURL" . | quote }}
            - name: HICLAW_MATRIX_DOMAIN
              value: {{ include "hiclaw.matrix.serverName" . | quote }}
            {{- /* OSS storage prefix */}}
            - name: HICLAW_STORAGE_PREFIX
              value: {{ include "hiclaw.storage.remoteRoot" . | quote }}
            {{- /* K8s mode runtime */}}
            - name: HICLAW_RUNTIME
              value: "k8s"
            {{- /* K8s worker resource defaults */}}
            - name: HICLAW_K8S_WORKER_CPU
              value: {{ .Values.worker.resources.limits.cpu | default "1000m" | quote }}
            - name: HICLAW_K8S_WORKER_MEMORY
              value: {{ .Values.worker.resources.limits.memory | default "2Gi" | quote }}
            {{- /* Manager CRD-driven deployment */}}
            - name: HICLAW_MANAGER_ENABLED
              value: {{ .Values.manager.enabled | quote }}
            - name: HICLAW_MANAGER_SPEC
              value: {{ include "hiclaw.manager.spec" . | quote }}
            {{- /* Element Web URL (for Gateway route initialization) */}}
            {{- if .Values.elementWeb.enabled }}
            - name: HICLAW_ELEMENT_WEB_URL
              value: {{ printf "http://%s-element-web.%s.svc.cluster.local:%d" (include "hiclaw.fullname" .) (include "hiclaw.namespace" .) (.Values.elementWeb.service.port | int) | quote }}
            {{- end }}
            {{- /* Credential persistence */}}
            - name: HICLAW_CREDS_DIR
              value: "/data/worker-creds"
            {{- /* CMS observability (propagated to manager + workers by controller) */}}
            {{- if .Values.cms.enabled }}
            - name: HICLAW_CMS_TRACES_ENABLED
              value: "true"
            - name: HICLAW_CMS_ENDPOINT
              value: {{ .Values.cms.endpoint | quote }}
            - name: HICLAW_CMS_LICENSE_KEY
              value: {{ .Values.cms.licenseKey | quote }}
            - name: HICLAW_CMS_PROJECT
              value: {{ .Values.cms.project | quote }}
            - name: HICLAW_CMS_WORKSPACE
              value: {{ .Values.cms.workspace | quote }}
            - name: HICLAW_CMS_SERVICE_NAME
              value: {{ .Values.cms.serviceName | default "hiclaw-manager" | quote }}
            {{- if .Values.cms.metricsEnabled }}
            - name: HICLAW_CMS_METRICS_ENABLED
              value: "true"
            {{- end }}
            {{- end }}
            {{- range $k, $v := .Values.controller.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          volumeMounts:
            - name: worker-creds
              mountPath: /data/worker-creds
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
        {{- if .Values.credentialProvider.enabled }}
        {{- $cpTag := include "hiclaw.imageTag" (dict "tag" .Values.credentialProvider.image.tag "global" .Values.global) }}
        - name: credential-provider
          image: "{{ required "credentialProvider.image.repository is required" .Values.credentialProvider.image.repository }}:{{ $cpTag }}"
          imagePullPolicy: {{ .Values.credentialProvider.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: creds
              containerPort: {{ .Values.credentialProvider.port | int }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.credentialProvider.port | quote }}
            {{- range $k, $v := .Values.credentialProvider.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.credentialProvider.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.credentialProvider.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: creds
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: creds
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
        {{- end }}
      volumes:
        - name: worker-creds
          emptyDir: {}
